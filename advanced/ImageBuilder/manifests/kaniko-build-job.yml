# Kaniko 이미지 빌드 Job
# Docker daemon 없이 사용자 공간에서 컨테이너 이미지를 빌드
# ConfigMap 빌드 컨텍스트 → initContainer로 workspace 복사 → Kaniko 빌드 → registry push
# 참고: Google이 2025년 6월 Kaniko를 아카이브함, Chainguard가 포크 유지 중
apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-build
  labels:
    app: kaniko-build
    pattern: ImageBuilder
    builder: kaniko
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: kaniko-build
        pattern: ImageBuilder
    spec:
      restartPolicy: Never
      initContainers:
      # ConfigMap 파일을 빌드 컨텍스트 디렉토리로 복사
      # ConfigMap 마운트는 심볼릭 링크를 생성하므로 실제 파일로 복사 필요
      - name: prepare-context
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          cp /configmap/Dockerfile /workspace/Dockerfile
          cp /configmap/index.html /workspace/index.html
          ls -la /workspace/
        volumeMounts:
        - name: build-context
          mountPath: /configmap
        - name: workspace
          mountPath: /workspace
      containers:
      - name: kaniko
        image: gcr.io/kaniko-project/executor:latest
        args:
        - "--dockerfile=/workspace/Dockerfile"
        - "--context=dir:///workspace"
        - "--destination=registry.kube-system.svc.cluster.local/imagebuilder-test:kaniko"
        - "--insecure"
        - "--insecure-pull"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      volumes:
      - name: build-context
        configMap:
          name: build-context
      - name: workspace
        emptyDir: {}
