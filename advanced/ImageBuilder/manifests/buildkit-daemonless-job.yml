# BuildKit 단발성 빌드 Job (daemonless 모드)
# buildctl-daemonless.sh로 빌드킷 데몬을 임시 시작 → 빌드 → 종료
# 2025-2026년 기준 사실상 표준 빌드 엔진 (Docker, Dagger, Depot 모두 사용)
# securityContext.privileged: true 필요 (BuildKit 표준 모드)
apiVersion: batch/v1
kind: Job
metadata:
  name: buildkit-daemonless-build
  labels:
    app: buildkit-daemonless-build
    pattern: ImageBuilder
    builder: buildkit
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: buildkit-daemonless-build
        pattern: ImageBuilder
    spec:
      restartPolicy: Never
      initContainers:
      - name: prepare-context
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          cp /configmap/Dockerfile /workspace/Dockerfile
          cp /configmap/index.html /workspace/index.html
          ls -la /workspace/
        volumeMounts:
        - name: build-context
          mountPath: /configmap
        - name: workspace
          mountPath: /workspace
      containers:
      - name: buildkit
        image: moby/buildkit:latest
        command:
        - buildctl-daemonless.sh
        args:
        - build
        - --frontend=dockerfile.v0
        - --local
        - context=/workspace
        - --local
        - dockerfile=/workspace
        - --output
        - type=image,name=registry.kube-system.svc.cluster.local/imagebuilder-test:buildkit,push=true,registry.insecure=true
        securityContext:
          privileged: true
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      volumes:
      - name: build-context
        configMap:
          name: build-context
      - name: workspace
        emptyDir: {}
